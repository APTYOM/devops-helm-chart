apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: devops-app-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: devops-app
  namespaceSelector:
    matchNames:
    - default
  podMetricsEndpoints:
  - port: http
    path: /metrics
    interval: 30s
